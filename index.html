<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AEGIS | CORE_INTERFACE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #ffaa00; font-family: 'Courier New', monospace; overflow: hidden; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .widget { position: absolute; padding: 15px; border: 1px solid #ffaa00; background: rgba(255, 170, 0, 0.1); pointer-events: auto; z-index: 100; }
        #stark-id-box { top: 20px; left: 20px; font-size: 0.8em; }
        #convo-widget { bottom: 20px; right: 20px; width: 300px; height: 150px; overflow-y: auto; }
        #status-link { top: 20px; right: 20px; color: #00ff00; }
    </style>
</head>
<body onclick="initAudio()">
    <div id="ui-layer">
        <div id="stark-id-box" class="widget">STARK_ID: <span id="my-id">GENERATING...</span></div>
        <div id="status-link" class="widget">LINK_STATUS: OFFLINE</div>
        <div id="convo-widget" class="widget">>> SYSTEM_READY...<br>>> CLICK TO INITIALIZE VOICE</div>
    </div>

    <script>
        // --- 1. THE VOICE (FRIDAY) ---
        let audioInitialized = false;
        function speak(text) {
            if (!audioInitialized) return;
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1.1; 
            msg.pitch = 1.2; // Slightly higher for the "FRIDAY" feel
            window.speechSynthesis.speak(msg);
            document.getElementById('convo-widget').innerHTML += `<br>>> FRIDAY: ${text}`;
        }

        function initAudio() {
            if (audioInitialized) return;
            audioInitialized = true;
            speak("Neural link initialized. FRIDAY is online.");
        }

        // --- 2. THE HOLOGRAM ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Particle Suit Hologram
        const geometry = new THREE.SphereGeometry(2, 32, 32);
        const material = new THREE.PointsMaterial({ color: 0xffaa00, size: 0.05 });
        const hologram = new THREE.Points(geometry, material);
        scene.add(hologram);
        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            hologram.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();

        // --- 3. THE NEURAL LINK (PEERJS) ---
        const peer = new Peer();
        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
        });

        peer.on('connection', (conn) => {
            document.getElementById('status-link').innerText = "LINK_STATUS: ESTABLISHED";
            speak("Mobile connection established, Boss.");
            
            conn.on('data', (data) => {
                document.getElementById('convo-widget').innerHTML += `<br>>> CMD: ${data}`;
                if(data === "STATUS_CHECK") speak("All systems operating within normal parameters.");
            });
        });
    </script>
</body>
</html>
