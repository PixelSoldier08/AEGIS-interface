<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AEGIS V8.0 | VOLUMETRIC_WORKSHOP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00e5ff; font-family: 'Courier New', monospace; overflow: hidden; }
        .hud { position: fixed; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; z-index: 100; pointer-events: none; }
        .top-right { top: 30px; right: 30px; text-align: right; border-right: 2px solid #00e5ff; padding-right: 10px; }
        .bottom-left { bottom: 30px; left: 30px; border-left: 2px solid #00e5ff; padding-left: 10px; }
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .boot-btn { border: 1px solid #00e5ff; padding: 20px; background: transparent; color: #00e5ff; cursor: pointer; letter-spacing: 5px; font-family: inherit; }
        /* The Glow Filter */
        canvas { filter: drop-shadow(0 0 10px rgba(0, 229, 255, 0.5)); }
    </style>
</head>
<body>

    <div id="overlay" onclick="bootSystem()">
        <button class="boot-btn">SYNC_VOLUMETRIC_SUIT</button>
    </div>

    <div class="hud top-right">
        <div>SYSTEM: AEGIS_V8.0</div>
        <div>SCAN: POINT_CLOUD_ACTIVE</div>
    </div>

    <div class="hud bottom-left">
        <div>LOC: TIRUCHIRAPPALLI, IN</div>
        <div>OPERATOR: B.Sc. PHYSICS</div>
    </div>

    <script>
        let isBooted = false;
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- THE VOLUMETRIC CORE ---
        let particles;
        const loader = new THREE.TextureLoader();
        
        // Using your suit.png to map the points
        loader.load('suit.png', function(texture) {
            const count = 15000; // Total glowing points
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const opacity = new Float32Array(count);

            for (let i = 0; i < count; i++) {
                // We create a humanoid silhouette using mathematical clusters
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                
                // Distributing points in 3D space to form depth
                const r = 2.5 + (Math.random() * 0.5); 
                const x = r * Math.sin(phi) * Math.cos(theta);
                const y = (Math.random() * 12) - 6; // Height of the suit
                const z = r * Math.sin(phi) * Math.sin(theta);

                positions[i * 3] = x;
                positions[i * 3 + 1] = y;
                positions[i * 3 + 2] = z;
                opacity[i] = Math.random();
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            // This material makes each dot look like a glowing light source
            const material = new THREE.PointsMaterial({ 
                color: 0x00e5ff, 
                size: 0.04, 
                transparent: true, 
                blending: THREE.AdditiveBlending,
                depthWrite: false 
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            // Add an inner "Power Core" light
            const coreLight = new THREE.PointLight(0x00e5ff, 2, 10);
            scene.add(coreLight);
        });

        // Floor Grid (Stark Lab Style)
        const grid = new THREE.GridHelper(30, 40, 0x004444, 0x002222);
        grid.position.y = -7;
        scene.add(grid);

        camera.position.z = 12;
        camera.position.y = 2;

        function bootSystem() {
            if (isBooted) return;
            isBooted = true;
            document.getElementById('overlay').style.display = 'none';
            // Start FRIDAY's greeting
            const greet = new SpeechSynthesisUtterance("Welcome home, Boss. Volumetric projection stabilized.");
            greet.pitch = 1.2;
            window.speechSynthesis.speak(greet);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            if (particles) {
                // Rotation like in the workshop video
                particles.rotation.y += 0.005;
                
                // Subtle flicker effect to simulate data streaming
                particles.material.opacity = 0.6 + Math.sin(time * 10) * 0.1;
                
                // Floating effect
                particles.position.y = Math.sin(time) * 0.1;
            }

            renderer.render(scene, camera);
        }
        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
