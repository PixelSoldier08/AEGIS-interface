<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AEGIS V16.0 | VOICE_RECOGNITION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: #ffaa00; font-family: 'Courier New', monospace; }
        .hud { position: fixed; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; z-index: 100; pointer-events: none; }
        .top-right { top: 30px; right: 30px; text-align: right; border-right: 2px solid #ffaa00; padding-right: 10px; }
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200;
            display: flex; justify-content: center; align-items: center;
        }
        .boot-btn { border: 1px solid #ffaa00; padding: 20px; background: transparent; color: #ffaa00; cursor: pointer; letter-spacing: 5px; }
        #log { position: fixed; bottom: 30px; left: 30px; font-size: 11px; color: rgba(255, 170, 0, 0.8); width: 450px; line-height: 1.5; }
        #mic-status { color: #00ff00; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="overlay" onclick="bootSystem()">
        <button class="boot-btn">INITIALIZE_VOICE_CORE</button>
    </div>

    <div class="hud top-right">
        <div>SYSTEM: AEGIS_V16.0</div>
        <div>INPUT: MIC_LISTENER_ACTIVE</div>
        <div id="mic-status">LISTENING...</div>
    </div>

    <div id="log">>> CALIBRATING_AUDIO_SENSORS...</div>

    <script>
        let isBooted = false;
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const orbit = new THREE.OrbitControls(camera, renderer.domElement);
        orbit.enableDamping = true;

        // --- 1. THE DIALOGUE ENGINE ---
        const FridayPersonality = {
            greetings: [
                "Always listening, Boss. What's the play?",
                "Online and at your service. Need a hand with the armor?",
                "Systems green. Ready for your instructions.",
                "I'm here. Scanning for potential breakthroughs."
            ],
            jokes: [
                "I'm currently running a simulation of us actually finishing this. It's... optimistic.",
                "My logic circuits suggest you should be sleeping, but since when do we follow logic?",
                "I’ve optimized the workshop climate. It’s now exactly 21 degrees. You’re welcome."
            ]
        };

        function speakFriday(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            utterance.voice = voices.find(v => v.lang === 'en-GB' && v.name.includes('Female')) || voices[0];
            utterance.pitch = 1.25;
            window.speechSynthesis.speak(utterance);
            document.getElementById('log').innerHTML = ">> FRIDAY: " + text;
        }

        // --- 2. THE EAR (VOICE RECOGNITION) ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.lang = 'en-US';

        recognition.onresult = (event) => {
            const current = event.resultIndex;
            const transcript = event.results[current][0].transcript.toLowerCase();
            console.log("Detected:", transcript);

            if (transcript.includes("friday") || transcript.includes("hello")) {
                const response = FridayPersonality.greetings[Math.floor(Math.random() * FridayPersonality.greetings.length)];
                speakFriday(response);
            }
        };

        recognition.onend = () => { if(isBooted) recognition.start(); }; // Keep it alive

        // --- 3. 3D HOLOGRAM ---
        function createHologram() {
            const loader = new THREE.TextureLoader();
            loader.load('suit.png', function(texture) {
                const canvas = document.createElement('canvas');
                const img = texture.image;
                canvas.width = img.width; canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                const positions = [], colors = [];

                for (let y = 0; y < canvas.height; y += 1) {
                    for (let x = 0; x < canvas.width; x += 1) {
                        const i = (y * canvas.width + x) * 4;
                        if (imgData[i+3] > 60) {
                            positions.push((x - canvas.width/2)/90, -(y - canvas.height/2)/90, (Math.random()-0.5)*0.5);
                            colors.push(imgData[i]/255, imgData[i+1]/255, imgData[i+2]/255);
                        }
                    }
                }
                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
                const points = new THREE.Points(geometry, new THREE.PointsMaterial({ size: 0.015, vertexColors: true, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending }));
                scene.add(points);
            });
        }

        camera.position.set(0, 0, 10);

        function bootSystem() {
            if (isBooted) return;
            isBooted = true;
            document.getElementById('overlay').style.display = 'none';
            createHologram();
            recognition.start(); // Start listening
            speakFriday("Voice recognition active. I'm listening for the wake-word, Boss.");
        }

        function animate() {
            requestAnimationFrame(animate);
            orbit.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
