<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AEGIS V9.0 | VOLUMETRIC_CORE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00e5ff; font-family: 'Courier New', monospace; overflow: hidden; }
        .hud { position: fixed; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; z-index: 100; pointer-events: none; }
        .top-right { top: 30px; right: 30px; text-align: right; border-right: 2px solid #00e5ff; padding-right: 10px; }
        .bottom-left { bottom: 30px; left: 30px; border-left: 2px solid #00e5ff; padding-left: 10px; }
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .boot-btn { border: 1px solid #00e5ff; padding: 20px; background: transparent; color: #00e5ff; cursor: pointer; letter-spacing: 5px; font-family: inherit; }
        #log { position: fixed; bottom: 80px; left: 30px; font-size: 11px; color: rgba(0, 229, 255, 0.4); }
    </style>
</head>
<body>

    <div id="overlay" onclick="bootSystem()">
        <button class="boot-btn">RESTORE_FRIDAY_VOICE_&_STARK_HOLO</button>
    </div>

    <div class="hud top-right">
        <div>SYSTEM: AEGIS_V9.0</div>
        <div>SCAN: IMAGE_TO_PARTICLE_MAPPING</div>
    </div>

    <div class="hud bottom-left">
        <div>LOC: TIRUCHIRAPPALLI, IN</div>
        <div>OPERATOR: B.Sc. PHYSICS</div>
    </div>

    <div id="log">>> SYSTEM_OFFLINE</div>

    <script>
        let isBooted = false;
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 1. THE VOICE RESTORATION ---
        function speakFriday(text) {
            window.speechSynthesis.cancel(); // Clear previous queue
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            // Force a female British voice if possible
            utterance.voice = voices.find(v => v.lang.includes('en-GB') && v.name.includes('Female')) || voices[0];
            utterance.pitch = 1.2;
            utterance.rate = 1.0;
            window.speechSynthesis.speak(utterance);
            document.getElementById('log').innerHTML = ">> FRIDAY: " + text;
        }

        // --- 2. IMAGE-TO-3D PARTICLE MAPPING ---
        function createHologram() {
            const loader = new THREE.TextureLoader();
            loader.load('suit.png', function(texture) {
                const canvas = document.createElement('canvas');
                const img = texture.image;
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                const positions = [];
                const colors = [];

                // Skip pixels to keep performance smooth (every 4th pixel)
                for (let y = 0; y < canvas.height; y += 4) {
                    for (let x = 0; x < canvas.width; x += 4) {
                        const index = (y * canvas.width + x) * 4;
                        const r = imgData[index];
                        const g = imgData[index+1];
                        const b = imgData[index+2];
                        const avg = (r + g + b) / 3;

                        if (avg > 30) { // Only map the "glowing" parts of your PNG
                            const posX = (x - canvas.width / 2) / 30;
                            const posY = -(y - canvas.height / 2) / 30;
                            const posZ = (Math.random() - 0.5) * 1.5; // Adds 3D thickness

                            positions.push(posX, posY, posZ);
                            colors.push(r/255, g/255, b/255);
                        }
                    }
                }

                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

                const material = new THREE.PointsMaterial({ 
                    size: 0.05, 
                    vertexColors: true, 
                    transparent: true, 
                    opacity: 0.8,
                    blending: THREE.AdditiveBlending 
                });

                const points = new THREE.Points(geometry, material);
                scene.add(points);
                
                window.holoSuit = points;
            });
        }

        const grid = new THREE.GridHelper(20, 20, 0x00e5ff, 0x002222);
        grid.position.y = -6;
        scene.add(grid);

        camera.position.z = 12;

        function bootSystem() {
            if (isBooted) return;
            isBooted = true;
            document.getElementById('overlay').style.display = 'none';
            createHologram();
            speakFriday("Welcome home, Boss. Mapping image data to volumetric particles now.");
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            if (window.holoSuit) {
                window.holoSuit.rotation.y += 0.005;
                window.holoSuit.position.y = Math.sin(time) * 0.2;
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
