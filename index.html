<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS V6.0 | FRIDAY INTEGRATED</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00e5ff; font-family: 'Courier New', monospace; overflow: hidden; }
        
        /* HUD UI */
        .hud { position: fixed; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; z-index: 100; pointer-events: none; }
        .top-right { top: 30px; right: 30px; text-align: right; border-right: 2px solid #00e5ff; padding-right: 10px; }
        .bottom-left { bottom: 30px; left: 30px; border-left: 2px solid #00e5ff; padding-left: 10px; }
        
        /* Loading & Unlock Overlay */
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .boot-btn { 
            border: 1px solid #00e5ff; padding: 20px; background: transparent; 
            color: #00e5ff; cursor: pointer; letter-spacing: 5px; font-family: inherit;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 5px #00e5ff; } 50% { box-shadow: 0 0 20px #00e5ff; } }

        #log-screen { 
            position: fixed; bottom: 80px; left: 30px; font-size: 11px; 
            color: rgba(0, 229, 255, 0.4); z-index: 100; max-height: 120px; overflow: hidden; 
        }
        .scanlines { position: fixed; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(0, 229, 255, 0.02) 50%); background-size: 100% 4px; pointer-events: none; z-index: 50; }
    </style>
</head>
<body>

    <div id="overlay" onclick="bootSystem()">
        <button class="boot-btn">INITIALIZE_FRIDAY_PROTOCOL</button>
        <p style="font-size: 8px; margin-top: 15px; color: #444;">[ BIOMETRIC SCAN REQUIRED ]</p>
    </div>

    <div class="scanlines"></div>

    <div class="hud top-right">
        <div>SYSTEM: AEGIS_V6.0_INTEGRATED</div>
        <div>OS: FRIDAY_PERSONALITY_CORE</div>
    </div>

    <div class="hud bottom-left">
        <div>LOC: TIRUCHIRAPPALLI, IN</div>
        <div>OPERATOR: B.Sc. PHYSICS</div>
    </div>

    <div id="log-screen">>> SYSTEM_STANDBY...</div>

    <script>
        let isBooted = false;
        let fridayIsSpeaking = false;
        let lastCommandTime = 0;
        const log = document.getElementById('log-screen');

        // --- 1. DIALOGUE DATABASE ---
        const dialogues = {
            status: ["Systems nominal. Hologram integrity is stable at 98%.", "All sectors green, Boss. The core is behaving itself.", "We're online and optimized. Ready when you are."],
            physics: ["Gravity in Tiruchirappalli is holding steady. No anomalies.", "Space-time curvature is within normal parameters today.", "Thermodynamics modules are active. Entropy is under control."],
            general: ["Always a pleasure, Boss.", "At your service. What's the next move?", "I'm monitoring the grid. Everything looks sharp."]
        };

        function getRandom(type) { return dialogues[type][Math.floor(Math.random() * dialogues[type].length)]; }

        // --- 2. VOICE & SPEECH ---
        function speakFriday(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            utterance.voice = voices.find(v => v.lang.includes('en-GB') && v.name.includes('Female')) || voices[0];
            utterance.pitch = 1.2;
            utterance.rate = 1.05;
            utterance.onstart = () => { fridayIsSpeaking = true; };
            utterance.onend = () => { setTimeout(() => { fridayIsSpeaking = false; }, 800); };
            window.speechSynthesis.speak(utterance);
            log.innerHTML += `<br>>> FRIDAY: ${text}`;
        }

        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const mic = new Recognition();
        mic.continuous = true;
        mic.lang = 'en-US';

        mic.onresult = (event) => {
            const now = Date.now();
            if (fridayIsSpeaking || (now - lastCommandTime < 2500)) return;
            const cmd = event.results[event.results.length - 1][0].transcript.toLowerCase();
            log.innerHTML += `<br>>> USER: ${cmd}`;
            lastCommandTime = now;

            if (cmd.includes("status") || cmd.includes("report")) speakFriday(getRandom('status'));
            else if (cmd.includes("physics") || cmd.includes("gravity")) speakFriday(getRandom('physics'));
            else if (cmd.includes("friday") || cmd.includes("hello")) speakFriday(getRandom('general'));
            else if (cmd.includes("who are you")) speakFriday("I'm Friday. Your autonomous physics assistant.");
        };

        // --- 3. 3D HOLOGRAM ENGINE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const loader = new THREE.TextureLoader();
        const suitTexture = loader.load('suit.png'); // Ensure your file is named suit.png

        const spriteMat = new THREE.SpriteMaterial({ 
            map: suitTexture, 
            transparent: true, 
            opacity: 0.85, 
            blending: THREE.AdditiveBlending 
        });
        const hologram = new THREE.Sprite(spriteMat);
        hologram.scale.set(6, 10, 1);
        scene.add(hologram);

        const core = new THREE.Mesh(
            new THREE.SphereGeometry(0.15, 32, 32),
            new THREE.MeshBasicMaterial({ color: 0xffffff })
        );
        scene.add(core);

        camera.position.z = 8;

        function bootSystem() {
            if (isBooted) return;
            isBooted = true;
            document.getElementById('overlay').style.display = 'none';
            speakFriday("Aegis online. All systems integrated. Ready to work, Boss.");
            mic.start();
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = Date.now() * 0.002;
            hologram.position.y = Math.sin(t) * 0.15;
            core.position.y = hologram.position.y;
            core.scale.setScalar(1 + Math.sin(t * 2) * 0.2);
            renderer.render(scene, camera);
        }
        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
