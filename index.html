<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AEGIS V12.0 | KINETIC_INTERFACE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; color: #ffaa00; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
        .hud { position: fixed; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; z-index: 100; pointer-events: none; }
        .top-right { top: 30px; right: 30px; text-align: right; border-right: 2px solid #ffaa00; padding-right: 10px; }
        .bottom-left { bottom: 30px; left: 30px; border-left: 2px solid #ffaa00; padding-left: 10px; }
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .boot-btn { border: 1px solid #ffaa00; padding: 20px; background: transparent; color: #ffaa00; cursor: pointer; letter-spacing: 5px; font-family: inherit; }
        #log { position: fixed; bottom: 80px; left: 30px; font-size: 11px; color: rgba(255, 170, 0, 0.6); }
    </style>
</head>
<body>

    <div id="overlay" onclick="bootSystem()">
        <button class="boot-btn">INITIALIZE_KINETIC_LINK</button>
    </div>

    <div class="hud top-right">
        <div>SYSTEM: AEGIS_V12.0</div>
        <div>LINK: KINETIC_TOUCH_ENABLED</div>
    </div>

    <div class="hud bottom-left">
        <div>LOC: TIRUCHIRAPPALLI, IN</div>
        <div>OPERATOR: B.Sc. PHYSICS</div>
    </div>

    <div id="log">>> STANDBY_FOR_GESTURE_LINK...</div>

    <script>
        let isBooted = false;
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- TONY STARK TOUCH CONTROLS ---
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // Smooth motion like in the movies
        controls.dampingFactor = 0.05;
        controls.screenSpacePanning = false;
        controls.minDistance = 2; // Prevent zooming inside the suit
        controls.maxDistance = 20;

        // --- FRIDAY CONVERSATION CORE ---
        function speakFriday(text) {
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            utterance.voice = voices.find(v => v.lang === 'en-GB' && v.name.includes('Female')) || voices[0];
            utterance.pitch = 1.25;
            utterance.onstart = () => { console.log("Friday is speaking..."); };
            window.speechSynthesis.speak(utterance);
            document.getElementById('log').innerHTML = ">> FRIDAY: " + text;
        }

        // --- ULTRA-DETAIL MAPPING ---
        function createHologram() {
            const loader = new THREE.TextureLoader();
            loader.load('suit.png', function(texture) {
                const canvas = document.createElement('canvas');
                const img = texture.image;
                canvas.width = img.width; canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                const positions = [], colors = [];

                for (let y = 0; y < canvas.height; y += 1) { // Maximum detail
                    for (let x = 0; x < canvas.width; x += 1) {
                        const i = (y * canvas.width + x) * 4;
                        if (imgData[i+3] > 50) {
                            positions.push((x - canvas.width/2)/90, -(y - canvas.height/2)/90, (Math.random()-0.5)*0.5);
                            colors.push(imgData[i]/255, imgData[i+1]/255, imgData[i+2]/255);
                        }
                    }
                }

                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

                const points = new THREE.Points(geometry, new THREE.PointsMaterial({ 
                    size: 0.015, vertexColors: true, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending 
                }));
                points.position.y = 2.8;
                scene.add(points);
                window.holoSuit = points;
            });
        }

        const grid = new THREE.GridHelper(40, 50, 0xffaa00, 0x110800);
        grid.position.y = -4;
        scene.add(grid);

        camera.position.set(0, 2, 10);

        function bootSystem() {
            if (isBooted) return;
            isBooted = true;
            document.getElementById('overlay').style.display = 'none';
            createHologram();
            speakFriday("Kinetic link established. You can now manipulate the volumetric model directly, Boss.");
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Required for smooth damping
            if (window.holoSuit) {
                // Suit only auto-rotates slightly; user has primary control now
                window.holoSuit.rotation.y += 0.002; 
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
