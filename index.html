<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AEGIS V7.0 | VOLUMETRIC_CORE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00e5ff; font-family: 'Courier New', monospace; overflow: hidden; }
        .hud { position: fixed; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; z-index: 100; pointer-events: none; }
        .top-right { top: 30px; right: 30px; text-align: right; border-right: 2px solid #00e5ff; padding-right: 10px; }
        .bottom-left { bottom: 30px; left: 30px; border-left: 2px solid #00e5ff; padding-left: 10px; }
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .boot-btn { border: 1px solid #00e5ff; padding: 20px; background: transparent; color: #00e5ff; cursor: pointer; letter-spacing: 5px; font-family: inherit; }
        #log-screen { position: fixed; bottom: 80px; left: 30px; font-size: 11px; color: rgba(0, 229, 255, 0.4); z-index: 100; }
    </style>
</head>
<body>

    <div id="overlay" onclick="bootSystem()">
        <button class="boot-btn">SYNC_WORKSHOP_RESOURCES</button>
    </div>

    <div class="hud top-right">
        <div>SYSTEM: AEGIS_V7.0</div>
        <div>STATUS: VOLUMETRIC_SCAN_ACTIVE</div>
    </div>

    <div class="hud bottom-left">
        <div>LOC: TIRUCHIRAPPALLI, IN</div>
        <div>OPERATOR: B.Sc. PHYSICS</div>
    </div>

    <div id="log-screen">>> STANDBY...</div>

    <script>
        let isBooted = false;
        const log = document.getElementById('log-screen');

        // --- 1. FRIDAY VOICE ---
        function speakFriday(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            utterance.voice = voices.find(v => v.lang.includes('en-GB') && v.name.includes('Female')) || voices[0];
            utterance.pitch = 1.2;
            utterance.rate = 1.05;
            window.speechSynthesis.speak(utterance);
            log.innerHTML = ">> FRIDAY: " + text;
        }

        // --- 2. 3D VOLUMETRIC ENGINE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Particle System for the Suit
        let particles;
        const loader = new THREE.TextureLoader();
        
        loader.load('suit.png', function(texture) {
            const width = 128;
            const height = 128;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(width * height * 3);
            const colors = new Float32Array(width * height * 3);

            for (let i = 0; i < width * height; i++) {
                const x = (i % width) / width - 0.5;
                const y = (i / width) / height - 0.5;
                
                // This gives the "depth" Tony Stark uses in his models
                const z = (Math.random() - 0.5) * 0.2; 

                positions[i * 3] = x * 10;
                positions[i * 3 + 1] = -y * 15;
                positions[i * 3 + 2] = z;

                colors[i * 3] = 0.0;     // R
                colors[i * 3 + 1] = 0.9; // G (Glow Blue)
                colors[i * 3 + 2] = 1.0; // B
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({ 
                size: 0.05, 
                vertexColors: true, 
                transparent: true, 
                opacity: 0.8,
                blending: THREE.AdditiveBlending 
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        });

        // Spacetime Grid (Workshop Floor)
        const grid = new THREE.GridHelper(20, 20, 0x00e5ff, 0x002222);
        grid.position.y = -8;
        scene.add(grid);

        camera.position.z = 15;

        function bootSystem() {
            if (isBooted) return;
            isBooted = true;
            document.getElementById('overlay').style.display = 'none';
            speakFriday("Welcome home, sir. Volumetric workshop initialized. Spacetime grid is locked.");
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            if (particles) {
                // Actual 3D Rotation
                particles.rotation.y += 0.01;
                // Subtle breathing effect
                particles.scale.setScalar(1 + Math.sin(time) * 0.05);
            }

            grid.rotation.y = Math.sin(time * 0.5) * 0.1;
            renderer.render(scene, camera);
        }
        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
