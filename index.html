<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AEGIS V14.0 | NATURAL_INTERACTION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: #ffaa00; font-family: 'Courier New', monospace; }
        .hud { position: fixed; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; z-index: 100; pointer-events: none; }
        .top-right { top: 30px; right: 30px; text-align: right; border-right: 2px solid #ffaa00; padding-right: 10px; }
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200;
            display: flex; justify-content: center; align-items: center;
        }
        .boot-btn { border: 1px solid #ffaa00; padding: 20px; background: transparent; color: #ffaa00; cursor: pointer; letter-spacing: 5px; }
        #log { position: fixed; bottom: 30px; left: 30px; font-size: 11px; color: rgba(255, 170, 0, 0.6); }
    </style>
</head>
<body>

    <div id="overlay" onclick="bootSystem()">
        <button class="boot-btn">INITIALIZE_NATURAL_DRAG</button>
    </div>

    <div class="hud top-right">
        <div>SYSTEM: AEGIS_V14.0</div>
        <div>INPUT: KINETIC_RAYCAST_ACTIVE</div>
    </div>

    <div id="log">>> CALIBRATING_SENSORS...</div>

    <script>
        let isBooted = false;
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const orbit = new THREE.OrbitControls(camera, renderer.domElement);
        orbit.enableDamping = true;

        // --- 1. RAYCASTING FOR NATURAL GRAB ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isDragging = false;
        let offset = new THREE.Vector3();
        let intersectionPoint = new THREE.Vector3();
        let dragPlane = new THREE.Plane();

        // --- 2. FRIDAY VOICE HANDSHAKE ---
        function speakFriday(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            utterance.voice = voices.find(v => v.lang.includes('en-GB')) || voices[0];
            utterance.pitch = 1.2;
            window.speechSynthesis.speak(utterance);
            document.getElementById('log').innerHTML = ">> FRIDAY: " + text;
        }

        // --- 3. HIGH-RES VOLUMETRIC MAPPING (Clean BG) ---
        function createHologram() {
            const loader = new THREE.TextureLoader();
            loader.load('suit.png', function(texture) {
                const canvas = document.createElement('canvas');
                const img = texture.image;
                canvas.width = img.width; canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                const positions = [], colors = [];

                for (let y = 0; y < canvas.height; y += 1) {
                    for (let x = 0; x < canvas.width; x += 1) {
                        const i = (y * canvas.width + x) * 4;
                        if (imgData[i+3] > 60) {
                            positions.push((x - canvas.width/2)/90, -(y - canvas.height/2)/90, (Math.random()-0.5)*0.5);
                            colors.push(imgData[i]/255, imgData[i+1]/255, imgData[i+2]/255);
                        }
                    }
                }
                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
                const material = new THREE.PointsMaterial({ size: 0.015, vertexColors: true, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending });
                const points = new THREE.Points(geometry, material);
                points.position.y = 1;
                scene.add(points);
                window.holoSuit = points;
            });
        }

        // --- 4. INTERACTION LOGIC ---
        window.addEventListener('mousedown', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            if (window.holoSuit) {
                const intersects = raycaster.intersectObject(window.holoSuit);
                if (intersects.length > 0) {
                    isDragging = true;
                    orbit.enabled = false; // Stop camera while dragging suit
                    
                    // Create a plane at the suit's position facing the camera for smooth dragging
                    dragPlane.setFromNormalAndCoplanarPoint(
                        camera.getWorldDirection(new THREE.Vector3()).negate(),
                        window.holoSuit.position
                    );
                    
                    raycaster.ray.intersectPlane(dragPlane, intersectionPoint);
                    offset.copy(window.holoSuit.position).sub(intersectionPoint);
                    document.getElementById('log').innerHTML = ">> STATUS: KINETIC_DRAG_LOCKED";
                }
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging || !window.holoSuit) return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            if (raycaster.ray.intersectPlane(dragPlane, intersectionPoint)) {
                window.holoSuit.position.copy(intersectionPoint.add(offset));
            }
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            orbit.enabled = true;
            document.getElementById('log').innerHTML = ">> STATUS: SYSTEM_IDLE";
        });

        camera.position.set(0, 0, 10);

        function bootSystem() {
            if (isBooted) return;
            isBooted = true;
            document.getElementById('overlay').style.display = 'none';
            createHologram();
            speakFriday("Removing interface constraints. Drag the volumetric model directly to reposition, sir.");
        }

        function animate() {
            requestAnimationFrame(animate);
            orbit.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
