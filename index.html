<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS V6.0 | Stabilized FRIDAY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00e5ff; font-family: 'Courier New', monospace; overflow: hidden; }
        .hud { position: fixed; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; z-index: 100; pointer-events: none; }
        .top-right { top: 30px; right: 30px; text-align: right; border-right: 2px solid #00e5ff; padding-right: 10px; }
        .bottom-left { bottom: 30px; left: 30px; border-left: 2px solid #00e5ff; padding-left: 10px; }
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .pulse-text { animation: pulse 2s infinite; letter-spacing: 5px; cursor: pointer; border: 1px solid #00e5ff; padding: 20px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        #log-screen { position: fixed; bottom: 80px; left: 30px; font-size: 11px; color: rgba(0, 229, 255, 0.4); z-index: 100; height: 100px; overflow: hidden;}
    </style>
</head>
<body>

    <div id="overlay" onclick="bootSystem()">
        <div class="pulse-text">STABILIZE_&_INITIALIZE</div>
    </div>

    <div class="hud top-right">
        <div>SYSTEM: AEGIS_V6.0</div>
        <div>OS: FRIDAY_PERSONALITY_v2</div>
    </div>

    <div class="hud bottom-left">
        <div>LOC: TIRUCHIRAPPALLI, IN</div>
        <div>OPERATOR: B.Sc. PHYSICS</div>
    </div>

    <div id="log-screen">>> STANDBY...</div>

    <script>
        let isBooted = false;
        let fridayIsSpeaking = false;
        let lastCommandTime = 0;
        const log = document.getElementById('log-screen');

        // --- 1. STABILIZED VOICE ENGINE ---
        function speakFriday(text) {
            // Cancel any pending speech immediately
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            utterance.voice = voices.find(v => v.lang.includes('en-GB') && v.name.includes('Female')) || voices[0];
            utterance.pitch = 1.2;
            utterance.rate = 1.0;

            utterance.onstart = () => { fridayIsSpeaking = true; };
            utterance.onend = () => { 
                // Delay re-enabling the mic slightly to avoid echo loops
                setTimeout(() => { fridayIsSpeaking = false; }, 500); 
            };

            window.speechSynthesis.speak(utterance);
            log.innerHTML += `<br>>> FRIDAY: ${text}`;
            log.scrollTop = log.scrollHeight;
        }

        // --- 2. MICROPHONE PROTOCOL WITH REPEAT PROTECTION ---
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const mic = new Recognition();
        mic.continuous = true;
        mic.lang = 'en-US';

        function bootSystem() {
            if (isBooted) return;
            isBooted = true;
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').remove();
                speakFriday("System stabilized. I'm all ears, Boss.");
                mic.start();
            }, 500);
        }

        mic.onresult = (event) => {
            const now = Date.now();
            // 1. Ignore if FRIDAY is currently talking
            // 2. Ignore if it's been less than 2 seconds since the last command (anti-loop)
            if (fridayIsSpeaking || (now - lastCommandTime < 2000)) return;

            const command = event.results[event.results.length - 1][0].transcript.toLowerCase();
            
            // Only respond to specific keywords to avoid background noise triggers
            if (command.includes("status")) {
                lastCommandTime = now;
                speakFriday("All systems nominal. The core is behaving itself now.");
            } else if (command.includes("friday") || command.includes("hello")) {
                lastCommandTime = now;
                speakFriday("Always a pleasure. What's the next move?");
            } else if (command.includes("physics")) {
                lastCommandTime = now;
                speakFriday("Gravity is still constant. No anomalies detected in Tiruchirappalli.");
            }
        };

        // Automatic Mic Restart (If it times out)
        mic.onend = () => { if(isBooted) mic.start(); };

        // --- 3. 3D VISUALS ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const sphere = new THREE.Mesh(
            new THREE.IcosahedronGeometry(2, 2),
            new THREE.MeshBasicMaterial({ color: 0x00e5ff, wireframe: true, transparent: true, opacity: 0.3 })
        );
        scene.add(sphere);

        const core = new THREE.Mesh(
            new THREE.SphereGeometry(0.4, 32, 32),
            new THREE.MeshBasicMaterial({ color: 0xffffff })
        );
        scene.add(core);

        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            sphere.rotation.y += 0.005;
            sphere.rotation.x += 0.002;
            const pulse = 0.4 + Math.sin(Date.now() * 0.003) * 0.05;
            core.scale.set(pulse, pulse, pulse);
            renderer.render(scene, camera);
        }
        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
