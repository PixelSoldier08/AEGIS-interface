<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AEGIS | PRIME_STABLE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: #ffaa00; font-family: 'Courier New', monospace; }
        #hud { position: fixed; inset: 0; pointer-events: none; z-index: 100; padding: 25px; }
        .widget { position: absolute; padding: 12px; border: 1px solid rgba(255, 170, 0, 0.4); background: rgba(0, 0, 0, 0.85); pointer-events: auto; }
        #stark-id-box { top: 20px; left: 20px; font-size: 11px; border-left: 4px solid #00ff00; }
        #convo-log { bottom: 25px; left: 25px; width: 340px; max-height: 180px; overflow-y: auto; font-size: 11px; line-height: 1.4; border-bottom: 2px solid #ffaa00; }
        #link-status { bottom: 25px; right: 25px; color: #00ff00; font-weight: bold; border-right: 4px solid #00ff00; }
        #stark-id { color: #00ff00; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body onclick="bootSystem()">

    <div id="hud">
        <div id="stark-id-box" class="widget">NEURAL_ID: <span id="stark-id" onclick="copyID()">GENERATING...</span></div>
        <div id="convo-log" class="widget">>> AEGIS_SYSTEM_V3.5<br>>> STATUS: READY_FOR_HANDSHAKE...</div>
        <div id="link-status" class="widget">REMOTE: OFFLINE</div>
    </div>

    <script>
        let scene, camera, renderer, suitPoints;
        let isAudioReady = false;

        // --- 1. FRIDAY VOICE (Fixed Profile) ---
        function speak(text) {
            if (!isAudioReady) return;
            const msg = new SpeechSynthesisUtterance(text);
            msg.pitch = 1.1; msg.rate = 1.0;
            window.speechSynthesis.speak(msg);
            const log = document.getElementById('convo-log');
            log.innerHTML += `<br>>> FRIDAY: ${text}`;
            log.scrollTop = log.scrollHeight;
        }

        function bootSystem() {
            if (isAudioReady) return;
            isAudioReady = true;
            speak("Systems fully operational. Welcome back, Boss.");
        }

        // --- 2. THE SUIT (Precision Silhouette Logic) ---
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const loader = new THREE.TextureLoader();
        loader.load('suit.png', (texture) => {
            const img = texture.image;
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width; canvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const positions = [];
            
            // Critical: Step 5 prevents the orange box
            for (let y = 0; y < canvas.height; y += 5) {
                for (let x = 0; x < canvas.width; x += 5) {
                    const i = (y * canvas.width + x) * 4;
                    const alpha = data[i + 3];
                    // Alpha threshold 200 ensures only the suit is drawn, no "box" edges
                    if (alpha > 200) { 
                        positions.push(
                            (x - canvas.width / 2) * 0.055, 
                            -(y - canvas.height / 2) * 0.055, 
                            (Math.random() - 0.5) * 1.8 
                        );
                    }
                }
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ size: 0.11, color: 0xffaa00, transparent: true, opacity: 0.85 });
            suitPoints = new THREE.Points(geometry, material);
            scene.add(suitPoints);
        });

        camera.position.z = 25;

        function animate() {
            requestAnimationFrame(animate);
            if(suitPoints) suitPoints.rotation.y += 0.003;
            renderer.render(scene, camera);
        }
        animate();

        // --- 3. PEERJS (Stable Handshake) ---
        const peer = new Peer();
        peer.on('open', id => document.getElementById('stark-id').innerText = id);
        peer.on('connection', conn => {
            document.getElementById('link-status').innerText = "REMOTE: LINKED";
            speak("Neural link established. We are live.");
            
            conn.on('data', data => {
                document.getElementById('convo-log').innerHTML += `<br>>> REMOTE_CMD: ${JSON.stringify(data)}`;
                // Rotation/Zoom sync
                if(suitPoints && data.ry !== undefined) {
                    suitPoints.rotation.y = data.ry;
                    suitPoints.rotation.x = data.rx;
                    suitPoints.scale.setScalar(data.zoom || 1);
                }
            });
        });

        function copyID() {
            const id = document.getElementById('stark-id').innerText;
            navigator.clipboard.writeText(id);
            speak("I D copied to clipboard.");
        }
    </script>
</body>
</html>
