<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AEGIS | SUIT_RESTORATION_V22.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: #ffaa00; font-family: 'Courier New', monospace; }
        #hud-text { position: fixed; top: 30px; left: 30px; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; z-index: 10; }
        #stark-id { color: #00ff00; font-weight: bold; cursor: pointer; text-decoration: underline; }
        #boot-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    </style>
</head>
<body>
    <div id="boot-screen" onclick="restoreSuit()">
        <div style="letter-spacing: 5px;">LOAD_SUIT_TEXTURE</div>
    </div>

    <div id="hud-text">
        SYSTEM: AEGIS_V22.5_SUIT_LINK<br>
        ID: <span id="stark-id" onclick="copyID()">SYNCING...</span><br>
        <span id="conn-status" style="color:red;">LINK: OFFLINE</span>
    </div>

    <script>
        let scene, camera, renderer, particles;
        const peer = new Peer();

        peer.on('open', id => document.getElementById('stark-id').innerText = id);
        peer.on('connection', conn => {
            document.getElementById('conn-status').innerText = "LINK: ACTIVE";
            document.getElementById('conn-status').style.color = "#00ff00";
            conn.on('data', data => {
                if(particles) {
                    particles.rotation.y = data.ry;
                    particles.rotation.x = data.rx;
                }
            });
        });

        function restoreSuit() {
            document.getElementById('boot-screen').style.display = 'none';
            initThree();
        }

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const loader = new THREE.TextureLoader();
            // This line looks for 'suit.png' in your main GitHub folder
            loader.load('suit.png', function (texture) {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const img = texture.image;
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);

                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const vertices = [];
                
                // Scan the PNG and place particles where it's not transparent
                for (let y = 0; y < canvas.height; y += 4) {
                    for (let x = 0; x < canvas.width; x += 4) {
                        const alpha = imgData.data[((y * canvas.width + x) * 4) + 3];
                        if (alpha > 128) {
                            vertices.push(
                                (x - canvas.width / 2) * 0.05,
                                -(y - canvas.height / 2) * 0.05,
                                (Math.random() - 0.5) * 2
                            );
                        }
                    }
                }

                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
                const material = new THREE.PointsMaterial({ size: 0.08, color: 0xffaa00, transparent: true, opacity: 0.7 });
                particles = new THREE.Points(geometry, material);
                scene.add(particles);
            });

            camera.position.z = 30;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(particles) particles.rotation.y += 0.001;
            renderer.render(scene, camera);
        }

        function copyID() {
            navigator.clipboard.writeText(document.getElementById('stark-id').innerText);
            alert("STARK_ID COPIED");
        }
    </script>
</body>
</html>
