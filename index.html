<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS V6.0 | FRIDAY AI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00e5ff; font-family: 'Courier New', monospace; overflow: hidden; }
        .hud { position: fixed; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; z-index: 100; pointer-events: none; }
        .top-right { top: 30px; right: 30px; text-align: right; border-right: 2px solid #00e5ff; padding-right: 10px; }
        .bottom-left { bottom: 30px; left: 30px; border-left: 2px solid #00e5ff; padding-left: 10px; }
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s;
        }
        .pulse-text { animation: pulse 2s infinite; letter-spacing: 5px; cursor: pointer; border: 1px solid #00e5ff; padding: 20px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        #log-screen { position: fixed; bottom: 80px; left: 30px; font-size: 11px; color: rgba(0, 229, 255, 0.4); z-index: 100; }
    </style>
</head>
<body>

    <div id="overlay" onclick="bootSystem()">
        <div class="pulse-text">INITIALIZE_FRIDAY_CORE</div>
    </div>

    <div class="hud top-right">
        <div>SYSTEM: AEGIS_V6.0</div>
        <div>OS: FRIDAY_PERSONALITY</div>
    </div>

    <div class="hud bottom-left">
        <div>LOC: TIRUCHIRAPPALLI, IN</div>
        <div>OPERATOR: B.Sc. PHYSICS</div>
    </div>

    <div id="log-screen">>> STANDBY...</div>
    <div id="canvas-container"></div>

    <script>
        let isBooted = false;
        let isSpeaking = false; // The Lock
        const log = document.getElementById('log-screen');

        // --- 1. FRIDAY VOICE ENGINE ---
        function speakFriday(text) {
            // Prevent double-speaking
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel(); 
            }

            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            
            // Try to find a crisp British/Female voice
            utterance.voice = voices.find(v => v.lang.includes('en-GB') && v.name.includes('Female')) || voices[0];
            utterance.pitch = 1.2;
            utterance.rate = 1.0;

            utterance.onstart = () => { isSpeaking = true; };
            utterance.onend = () => { isSpeaking = false; };

            window.speechSynthesis.speak(utterance);
            log.innerHTML = ">> FRIDAY: " + text;
        }

        // --- 2. MICROPHONE PROTOCOL ---
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const mic = new Recognition();
        mic.continuous = true;
        mic.lang = 'en-US';

        function bootSystem() {
            if (isBooted) return;
            isBooted = true;
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').remove();
                speakFriday("System online. Ready for a spin, Boss.");
                mic.start();
            }, 500);
        }

        mic.onresult = (event) => {
            // If FRIDAY is talking, don't process what she says as a command!
            if (isSpeaking) return;

            const command = event.results[event.results.length - 1][0].transcript.toLowerCase();
            log.innerHTML = ">> USER: " + command;
            
            if (command.includes("status")) {
                speakFriday("All systems nominal. Singularity core is stable.");
            } else if (command.includes("friday") || command.includes("hello")) {
                speakFriday("Always a pleasure, Boss. How's the physics department today?");
            }
        };

        // --- 3. 3D CORE (Three.js) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const sphere = new THREE.Mesh(
            new THREE.IcosahedronGeometry(2, 2),
            new THREE.MeshBasicMaterial({ color: 0x00e5ff, wireframe: true, transparent: true, opacity: 0.4 })
        );
        scene.add(sphere);

        const core = new THREE.Mesh(
            new THREE.SphereGeometry(0.4, 32, 32),
            new THREE.MeshBasicMaterial({ color: 0xffffff })
        );
        scene.add(core);

        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            sphere.rotation.y += 0.005;
            sphere.rotation.x += 0.002;
            const pulse = 0.4 + Math.sin(Date.now() * 0.003) * 0.05;
            core.scale.set(pulse, pulse, pulse);
            renderer.render(scene, camera);
        }
        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
