<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AEGIS | 3D KINETIC INTERFACE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #00e5ff; }
        #hud { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .widget { position: absolute; padding: 20px; text-transform: uppercase; font-size: 12px; letter-spacing: 2px; }
        .top-right { top: 0; right: 0; text-align: right; border-right: 3px solid #00e5ff; }
        .bottom-left { bottom: 0; left: 0; border-left: 3px solid #00e5ff; }
    </style>
</head>
<body>
    <div id="hud">
        <div class="widget top-right">
            SYSTEM: AEGIS_v6.0_PROTOTYPE<br>STATUS: KINETIC_LINK_3D
        </div>
        <div class="widget bottom-left">
            LOC: TIRUCHIRAPPALLI, IN<br>OPERATOR: B.Sc. PHYSICS
        </div>
    </div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- THE 3D CORE ---
        const geometry = new THREE.IcosahedronGeometry(2, 1); // Fragmented look
        const material = new THREE.MeshBasicMaterial({ 
            color: 0x00e5ff, wireframe: true, transparent: true, opacity: 0.6 
        });
        const core = new THREE.Mesh(geometry, material);
        scene.add(core);

        // Inner glowing sphere
        const innerGeo = new THREE.SphereGeometry(0.5, 16, 16);
        const innerMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 });
        const heart = new THREE.Mesh(innerGeo, innerMat);
        core.add(heart);

        camera.position.z = 10;

        // --- KINETIC LINK ---
        const socket = io('http://localhost:5000');
        
        socket.on('hand_move', (data) => {
            // Smoothly move the 3D core
            const targetX = (data.x - 0.5) * 20;
            const targetY = (0.5 - data.y) * 15;
            const targetZ = 10 - (data.z * 15); // Z-depth mapping

            core.position.x += (targetX - core.position.x) * 0.1;
            core.position.y += (targetY - core.position.y) * 0.1;
            core.position.z += (targetZ - core.position.z) * 0.1;
        });

        function animate() {
            requestAnimationFrame(animate);
            core.rotation.y += 0.01;
            core.rotation.x += 0.005;
            renderer.render(scene, camera);
        }
        animate();

        window.onload = () => {
            const msg = new SpeechSynthesisUtterance("Aegis 3D kinetic protocol established.");
            msg.pitch = 0.7;
            window.speechSynthesis.speak(msg);
        };
    </script>
</body>
</html>
