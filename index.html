<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS V6.0 | FRIDAY Interface</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00e5ff; font-family: 'Courier New', monospace; overflow: hidden; }
        
        /* HUD Widgets */
        .hud { position: fixed; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; z-index: 100; pointer-events: none; }
        .top-right { top: 30px; right: 30px; text-align: right; border-right: 2px solid #00e5ff; padding-right: 10px; }
        .bottom-left { bottom: 30px; left: 30px; border-left: 2px solid #00e5ff; padding-left: 10px; }

        /* Loading Screen */
        #loading-overlay {
            position: fixed; inset: 0; background: #000; z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s ease;
        }
        #bar-container { width: 250px; height: 1px; background: #111; margin-top: 20px; }
        #bar { width: 0%; height: 100%; background: #00e5ff; box-shadow: 0 0 15px #00e5ff; }

        #canvas-container { position: absolute; inset: 0; z-index: 1; }
        
        /* Digital Scanline Filter */
        .scanline {
            width: 100%; height: 100%; position: absolute; z-index: 10;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 229, 255, 0.03) 50%);
            background-size: 100% 4px; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div style="letter-spacing: 8px; font-size: 12px; font-weight: bold;">LINKING_FRIDAY_MODULE</div>
        <div id="bar-container"><div id="bar"></div></div>
    </div>

    <div class="scanline"></div>

    <div class="hud top-right">
        <div>SYSTEM: AEGIS_V6.0_PROTOTYPE</div>
        <div>OS: FRIDAY_PERSONALITY_CORE</div>
    </div>

    <div class="hud bottom-left">
        <div>LOC: TIRUCHIRAPPALLI, IN</div>
        <div>OPERATOR: B.Sc. PHYSICS</div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- 1. FRIDAY BOOT & VOCAL PROTOCOL ---
        let progress = 0;
        const bar = document.getElementById('bar');
        
        const loadInterval = setInterval(() => {
            progress += Math.random() * 5;
            if (progress > 100) progress = 100;
            bar.style.width = progress + "%";
            
            if(progress >= 100) {
                clearInterval(loadInterval);
                const overlay = document.getElementById('loading-overlay');
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.remove();
                    speakFriday("Aegis updated and ready for a spin, Boss. Physics modules are synced and looking sharp.");
                }, 1000);
            }
        }, 70);

        function speakFriday(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            
            // Search for a crisp UK/Female voice for the FRIDAY vibe
            const fridayVoice = voices.find(v => v.name.includes('Female') && (v.lang.includes('en-GB') || v.lang.includes('en-IE'))) || voices[0];
            
            utterance.voice = fridayVoice;
            utterance.pitch = 1.25; // Snappy and energetic
            utterance.rate = 1.05; 
            window.speechSynthesis.speak(utterance);
        }

        // --- 2. 3D CORE RENDERING (Three.js) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Geometric Lattice (The Body)
        const geometry = new THREE.IcosahedronGeometry(2, 2);
        const material = new THREE.MeshBasicMaterial({ color: 0x00e5ff, wireframe: true, transparent: true, opacity: 0.5 });
        const sphere = new THREE.Mesh(geometry, material);
        scene.add(sphere);

        // The Singularity (The Heart)
        const coreGeo = new THREE.SphereGeometry(0.4, 32, 32);
        const coreMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const core = new THREE.Mesh(coreGeo, coreMat);
        scene.add(core);

        camera.position.z = 5;

        // Mouse Interaction
        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - window.innerWidth / 2) / 150;
            mouseY = (e.clientY - window.innerHeight / 2) / 150;
        });

        // --- 3. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            // Autonomous Rotations
            sphere.rotation.y += 0.008;
            sphere.rotation.x += 0.003;

            // Subtle Floating & Mouse Follow
            sphere.position.x += (mouseX - sphere.position.x) * 0.05;
            sphere.position.y += (-mouseY - sphere.position.y) * 0.05;
            sphere.position.y += Math.sin(time) * 0.05; // Floating effect

            core.position.copy(sphere.position);

            // The Pulse: Breathing core effect
            const pulse = 0.4 + Math.sin(time * 3) * 0.06;
            core.scale.set(pulse, pulse, pulse);

            renderer.render(scene, camera);
        }
        animate();

        // Responsive Resizing
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
