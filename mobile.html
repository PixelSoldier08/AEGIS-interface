<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AEGIS | KINETIC_LINK</title>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <style>
        body { 
            margin: 0; background: #000; color: #ffaa00; 
            font-family: 'Courier New', monospace; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }
        #header { margin-top: 20px; text-transform: uppercase; letter-spacing: 3px; font-size: 14px; }
        #connection-hub { width: 90%; margin: 20px 0; z-index: 10; }
        input { 
            width: 100%; padding: 15px; background: #111; border: 1px solid #ffaa00; 
            color: #ffaa00; border-radius: 5px; box-sizing: border-box; font-family: inherit;
            text-align: center; margin-bottom: 10px;
        }
        button { 
            width: 100%; padding: 15px; background: #ffaa00; border: none; 
            color: #000; font-weight: bold; border-radius: 5px; cursor: pointer;
            text-transform: uppercase;
        }
        #pad { 
            flex-grow: 1; width: 90vw; margin-bottom: 20px;
            border: 2px solid rgba(255, 170, 0, 0.3);
            border-radius: 20px; background: radial-gradient(circle, rgba(255,170,0,0.05) 0%, rgba(0,0,0,1) 80%);
            display: flex; align-items: center; justify-content: center;
            position: relative; touch-action: none;
        }
        #pad::after { content: "KINETIC_SENSOR_ACTIVE"; font-size: 10px; opacity: 0.3; letter-spacing: 5px; }
        .status { font-size: 10px; margin-top: 5px; color: #00ff00; }
    </style>
</head>
<body>

    <div id="header">Neural Link Interface</div>
    
    <div id="connection-hub">
        <input type="text" id="peer-input" placeholder="ENTER STARK_ID">
        <button id="connect-btn">INITIATE_HANDSHAKE</button>
        <div id="status-text" class="status">SYSTEM_IDLE</div>
    </div>

    <div id="pad"></div>

    <script>
        const peer = new Peer();
        let conn = null;
        let rotationX = 0, rotationY = 0, currentZoom = 1.0;
        let startX = 0, startY = 0, initialDist = 0;

        const pad = document.getElementById('pad');
        const status = document.getElementById('status-text');

        // --- 1. CONNECTION LOGIC ---
        document.getElementById('connect-btn').onclick = () => {
            const remoteId = document.getElementById('peer-input').value;
            status.innerText = "ATTEMPTING_LINK...";
            
            conn = peer.connect(remoteId);
            
            conn.on('open', () => {
                status.innerText = "LINK_ESTABLISHED";
                status.style.color = "#00ff00";
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]); // Stark-tech pulse
                pad.style.borderColor = "#00ff00";
            });

            conn.on('error', () => {
                status.innerText = "LINK_FAILED";
                status.style.color = "#ff0000";
            });
        };

        // --- 2. CONTROL LOGIC ---
        pad.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            }
        });

        pad.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            if (!conn || !conn.open) return;

            if (e.touches.length === 1) {
                // --- INVERTED ROTATION ---
                let touch = e.touches[0];
                let deltaX = touch.clientX - startX;
                let deltaY = touch.clientY - startY;

                rotationY += deltaX * 0.008; 
                rotationX -= deltaY * 0.008; // Inverted: Swipe up = View tilts down

                startX = touch.clientX;
                startY = touch.clientY;

            } else if (e.touches.length === 2) {
                // --- SMOOTH LINEAR ZOOM ---
                let dist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );

                if (initialDist === 0) {
                    initialDist = dist; 
                } else {
                    let delta = (dist - initialDist) * 0.005;
                    currentZoom = Math.min(Math.max(0.3, currentZoom + delta), 4.0);
                    initialDist = dist; // Baseline shift for smoothness
                }
            }

            // Sync with Desktop
            conn.send({
                ry: rotationY,
                rx: rotationX,
                zoom: currentZoom
            });
        });

        pad.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) {
                initialDist = 0; // Clear zoom reference
            }
        });

    </script>
</body>
</html>
