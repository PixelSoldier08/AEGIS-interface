<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AEGIS | REMOTE</title>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #ffaa00; font-family: monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        #pad { width: 90vw; height: 60vh; border: 1px solid #ffaa00; margin: 20px; border-radius: 15px; touch-action: none; background: radial-gradient(circle, #111 0%, #000 100%); }
        input, button { width: 80%; padding: 15px; margin: 5px; background: #111; border: 1px solid #ffaa00; color: #ffaa00; border-radius: 5px; }
        button { background: #ffaa00; color: #000; font-weight: bold; }
    </style>
</head>
<body>
    <h3 style="margin-top:20px;">AEGIS REMOTE</h3>
    <input type="text" id="targetId" placeholder="ENTER STARK_ID">
    <button onclick="connect()">ESTABLISH LINK</button>
    <div id="pad"></div>
    <div id="status">OFFLINE</div>

    <script>
        const peer = new Peer();
        let conn, rx = 0, ry = 0, zoom = 1, startX, startY, initialDist = 0;

        function connect() {
            conn = peer.connect(document.getElementById('targetId').value);
            conn.on('open', () => { 
                document.getElementById('status').innerText = "LINKED";
                if(navigator.vibrate) navigator.vibrate(100);
            });
        }

        const pad = document.getElementById('pad');
        pad.addEventListener('touchstart', e => {
            if(e.touches.length === 1) { startX = e.touches[0].clientX; startY = e.touches[0].clientY; }
        });

        pad.addEventListener('touchmove', e => {
            e.preventDefault();
            if(!conn || !conn.open) return;

            if(e.touches.length === 1) {
                let dx = e.touches[0].clientX - startX;
                let dy = e.touches[0].clientY - startY;
                ry += dx * 0.01;
                rx -= dy * 0.01; // INVERTED
                startX = e.touches[0].clientX; startY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                let d = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                if(initialDist === 0) initialDist = d;
                else {
                    zoom = Math.min(Math.max(0.3, zoom + (d - initialDist) * 0.005), 4);
                    initialDist = d;
                }
            }
            conn.send({ rx, ry, zoom });
        });

        pad.addEventListener('touchend', () => initialDist = 0);
    </script>
</body>
</html>
