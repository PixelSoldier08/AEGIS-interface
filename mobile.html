<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AEGIS | KINETIC_LINK</title>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <style>
        body { 
            margin: 0; background: #000; color: #ffaa00; 
            font-family: 'Courier New', monospace; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }
        #header { margin-top: 20px; text-transform: uppercase; letter-spacing: 3px; font-size: 14px; }
        #connection-hub { width: 90%; margin: 20px 0; z-index: 10; }
        input { 
            width: 100%; padding: 12px; background: #111; border: 1px solid #ffaa00; 
            color: #ffaa00; border-radius: 5px; box-sizing: border-box; font-family: inherit;
        }
        button { 
            width: 100%; margin-top: 10px; padding: 12px; background: #ffaa00; 
            color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 5px;
        }
        #pad { 
            width: 92vw; height: 60vh; border: 1px solid rgba(255, 170, 0, 0.4); 
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            position: relative; background: radial-gradient(circle, rgba(255,170,0,0.03) 0%, rgba(0,0,0,1) 90%);
            touch-action: none;
        }
        #pad::after { content: "READY FOR GESTURES"; font-size: 9px; opacity: 0.3; letter-spacing: 2px; }
        #status { margin-top: 15px; font-size: 11px; color: #00ff00; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div id="header">AEGIS REMOTE V2.2</div>
    <div id="connection-hub">
        <input type="text" id="targetId" placeholder="ENTER COMPUTER STARK_ID">
        <button onclick="connectToPC()">ESTABLISH LINK</button>
    </div>
    <div id="pad"></div>
    <div id="status">>> OFFLINE</div>

    <script>
        const peer = new Peer();
        let conn;
        let rotationX = 0, rotationY = 0, zoom = 1;
        let startX = 0, startY = 0, initialDist = 0;

        function connectToPC() {
            const id = document.getElementById('targetId').value.trim();
            if (!id) return;
            document.getElementById('status').innerHTML = ">> ATTEMPTING_HANDSHAKE...";
            conn = peer.connect(id);
            conn.on('open', () => {
                document.getElementById('status').innerHTML = ">> NEURAL_LINK_ESTABLISHED";
                document.getElementById('connection-hub').style.opacity = '0.3'; 
            });
        }

        const pad = document.getElementById('pad');
        pad.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            }
        });

        pad.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            if (!conn) return;

            if (e.touches.length === 1) {
                let touch = e.touches[0];
                let deltaX = touch.clientX - startX;
                let deltaY = touch.clientY - startY;
                rotationY += deltaX * 0.008; 
                rotationX += deltaY * 0.008;
                startX = touch.clientX;
                startY = touch.clientY;
            } else if (e.touches.length === 2) {
                let dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                if (initialDist === 0) { initialDist = dist; } 
                else {
                    let delta = (dist - initialDist) * 0.005;
                    zoom = Math.min(Math.max(0.3, zoom + delta), 4.0);
                    initialDist = dist;
                }
            }
            conn.send({ rx: rotationX, ry: rotationY, zoom: zoom });
        }, { passive: false });

        pad.addEventListener('touchend', () => { initialDist = 0; });
    </script>
</body>
</html>
